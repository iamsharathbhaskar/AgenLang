apiVersion: v1
kind: Service
metadata:
  name: agenlang-server
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics/prometheus"
spec:
  type: ClusterIP
  clusterIP: None  # Headless for direct pod access
  selector:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
# Additional service for direct access (optional LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: agenlang-server-lb
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: server-lb
  annotations:
    # Cloud provider annotations (examples)
    # AWS LB Controller
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # Azure Load Balancer
    # service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/health"
    # GCP Load Balancer
    # cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# PostgreSQL Service (optional)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: postgres
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
