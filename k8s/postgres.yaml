# PostgreSQL StatefulSet for AgenLang (optional)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agenlang
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agenlang
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: agenlang
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: agenlang-secrets
                  key: POSTGRES_USER
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agenlang-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "$(POSTGRES_USER)"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "$(POSTGRES_USER)"
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: fast-rwo
---
# Secret for PostgreSQL credentials (template)
# Apply with: kubectl apply -f k8s/postgres.yaml
# Then run: kubectl create secret generic agenlang-secrets \
#   --from-literal=POSTGRES_USER=agenlang \
#   --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=DATABASE_URL=postgresql://agenlang:$(openssl rand -base64 32)@postgres:5432/agenlang \
#   -n agenlang
