# AgenLang Secrets Template
# WARNING: Do NOT commit real secrets to version control!
# 
# Apply secrets using:
#   kubectl create secret generic agenlang-secrets \
#     --from-literal=TAVILY_API_KEY=your_key \
#     --from-literal=OPENAI_API_KEY=your_key \
#     --from-literal=ANTHROPIC_API_KEY=your_key \
#     --from-literal=XAI_API_KEY=your_key \
#     --from-literal=DATABASE_URL=postgresql://user:pass@host/db \
#     -n agenlang
#
# Or use sealed-secrets / external-secrets operator for GitOps

apiVersion: v1
kind: Secret
metadata:
  name: agenlang-secrets
  namespace: agenlang
  labels:
    app.kubernetes.io/name: agenlang
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Placeholder values - base64 encoded empty strings
  # Replace with: echo -n 'your-secret' | base64
  TAVILY_API_KEY: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  XAI_API_KEY: ""
  LLM_API_KEY: ""
  DATABASE_URL: ""
  REDIS_PASSWORD: ""
  AGENLANG_MASTER_KEY: ""
---
