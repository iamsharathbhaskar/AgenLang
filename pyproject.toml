[project]
name = "agenlang"
version = "0.1.0"
description = "AgenLang — standardized contract substrate for secure inter-agent communication"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
  "jsonschema>=4.0",
  "cryptography>=42.0",
  "click>=8.0",
  "requests>=2.0"
]

[project.scripts]
agenlang = "agenlang.cli:main"

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
